services:
  mysql:
    image: mysql:8.0
    container_name: betalent_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: betalent
      MYSQL_USER: betalent
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway_mock:
    image: matheusprotzen/gateways-mock
    container_name: betalent_gateways
    restart: unless-stopped
    ports:
      - "3001:3001"
      - "3002:3002"
    environment:
      - REMOVE_AUTH=false

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: betalent_app
    restart: unless-stopped
    ports:
      - "3333:3333"
    environment:
      NODE_ENV: production
      PORT: 3333
      HOST: 0.0.0.0
      LOG_LEVEL: info
      APP_KEY: ${APP_KEY}
      APP_URL: http://localhost:3333
      SESSION_DRIVER: cookie
      JWT_SECRET: ${JWT_SECRET}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: betalent
      DB_PASSWORD: secret
      DB_DATABASE: betalent
      GATEWAY1_URL: http://gateway_mock:3001
      GATEWAY1_EMAIL: dev@betalent.tech
      GATEWAY1_TOKEN: FEC9BB078BF338F464F96B48089EB498
      GATEWAY2_URL: http://gateway_mock:3002
      GATEWAY2_AUTH_TOKEN: tk_f2198cc671b5289fa856
      GATEWAY2_AUTH_SECRET: 3d15e8ed6131446ea7e3456728b1211f
    depends_on:
      mysql:
        condition: service_healthy
      gateway_mock:
        condition: service_started

volumes:
  mysql_data:
